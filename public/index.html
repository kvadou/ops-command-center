    <!-- Sanitize URL query params BEFORE Meta Pixel loads to avoid sending blocked params -->
    <!-- SECURITY: Password reset tokens are captured and preserved separately to avoid sending them to Meta -->
    <script>
      (function () {
        try {
          var current = new URL(window.location.href);
          
          // SECURITY: Capture password reset token BEFORE sanitization
          // Only preserve if we're on the reset-password page
          var resetToken = null;
          if (current.pathname === '/reset-password' || current.pathname.endsWith('/reset-password')) {
            resetToken = current.searchParams.get('token');
            if (resetToken) {
              // Store in sessionStorage as backup (ResetPassword component also uses this)
              sessionStorage.setItem('passwordResetToken', resetToken);
            }
          }
          
          // Whitelist of params safe to send to Meta (DO NOT include sensitive tokens)
          var allowed = new Set([
            'utm_source',
            'utm_medium',
            'utm_campaign',
            'utm_content',
            'utm_term',
            'utm_id',
            // Google Ads click IDs — must be preserved for offline conversion tracking
            'gclid',
            'wbraid',
            'gbraid',
            // Other ad platform click IDs
            'msclkid',
            'ttclid',
            // Preserve deep-linking params needed by the app
            'bookingTypeId',
            'serviceId',
            // Event Lead Capture deep links
            'eventId',
            'eventName',
            // Preserve Stripe success params used by SuccessPage
            'submissionId',
            'session_id',
            // Staff booking mode
            'staff',
            // NOTE: 'token' is intentionally NOT whitelisted to prevent sending to Meta
          ]);
          
          // Build a clean URL preserving only whitelisted params (excludes token)
          var clean = new URL(current.origin + current.pathname + current.hash);
          current.searchParams.forEach(function (value, key) {
            if (allowed.has(key)) clean.searchParams.set(key, value);
          });
          
          // Restore password reset token to URL if we're on reset-password page
          // This preserves it for the React app without sending it to Meta
          if (resetToken && (clean.pathname === '/reset-password' || clean.pathname.endsWith('/reset-password'))) {
            clean.searchParams.set('token', resetToken);
          }
          
          if (clean.href !== current.href) {
            window.history.replaceState(null, '', clean.href);
          }
        } catch (e) {
          // no-op
        }
      })();
    </script>
